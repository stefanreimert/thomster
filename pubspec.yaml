name: thomster
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  flutter_web_auth_2: ^4.0.1
  http: ^1.2.2
  crypto: ^3.0.6
  mobile_scanner: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true


flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#A259FF"

flutter_native_splash:
  color: "#0B0F1A"
  color_dark: "#0B0F1A"
  image: assets/branding/splash_logo.png
  image_dark: assets/branding/splash_logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#0B0F1A"
    color_dark: "#0B0F1A"
    image: assets/branding/splash_logo.png
    image_dark: assets/branding/splash_logo.png
